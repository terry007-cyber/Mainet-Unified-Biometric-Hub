<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Face Biometric System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 900px; margin: 2rem auto; background-color: #f0f8ff; color: #333; }
        .container { background: white; padding: 2rem; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); border-top: 5px solid #007bff; }
        h1 { text-align: center; color: #007bff; margin-bottom: 30px; }
        .box { border: 1px solid #ddd; padding: 20px; border-radius: 8px; margin-bottom: 20px; background-color: #fafafa; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #444; border-bottom: 2px solid #007bff; padding-bottom: 10px; display: inline-block; }
        .manual-comparator-title { border-bottom-color: #17a2b8; color: #117a8b; }
        label { display: block; margin: 10px 0 5px; font-weight: bold; }
        input[type="text"], input[type="file"] { width: 100%; padding: 8px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; font-size: 16px; cursor: pointer; border-radius: 5px; width: 100%; }
        button:hover { background-color: #0056b3; }
        .result { margin-top: 15px; padding: 15px; border-radius: 5px; display: none; font-weight: bold; text-align: center; }
        .success { background-color: #d4edda; color: #155724; }
        .error { background-color: #f8d7da; color: #721c24; }
        .preview { max-width: 100%; height: 150px; object-fit: contain; margin-top: 10px; border-radius: 5px; display: none; border: 1px dashed #ccc;}
        
        .match-pattern { width: 100%; margin-top: 15px; border: 2px solid #007bff; border-radius: 8px; display: none; box-shadow: 0 4px 8px rgba(0,0,0,0.2); }
        .box-manual-comparator { border-top: 4px solid #17a2b8; }
        .manual-comparator-flex { display: flex; gap: 10px; }
        .manual-comparator-flex-child { flex: 1; }
        .compare-btn {
            background-color: #17a2b8;
            margin-top: 15px;
        }
        .manual-border-color {
            border-color: #17a2b8;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Phase 1: Face System</h1>

    <!-- 1. REGISTRATION -->
    <div class="box">
        <h2>1. Register Face</h2>
        <form id="registerForm">
            <label for="regName">User Name:</label>
            <input type="text" id="regName" required placeholder="Enter Name" aria-label="User Name">
            <label for="regPhoto">Upload Face Photo:</label>
            <input type="file" id="regPhoto" accept="image/*" required onchange="showPreview(this, 'regPreview')" title="Upload face photo" aria-label="Upload face photo">
            <img id="regPreview" class="preview">
            <button type="submit">Scan & Register</button>
        </form>
        <div id="regResult" class="result"></div>
    </div>

    <!-- 2. SERVER ID -->
    <div class="box">
        <h2>2. Server Identification (1:N)</h2>
        <form id="identifyForm">
            <label>Upload Face to Check:</label>
            <input type="file" id="checkPhoto" accept="image/*" required onchange="showPreview(this, 'authPreview')" title="Upload face to check" placeholder="Upload face to check" aria-label="Upload face to check">
            <img id="authPreview" class="preview">
            <button type="submit">Search Database</button>
        </form>
        <div id="idResult" class="result"></div>
        <img id="matchPatternDB" class="match-pattern">
    </div>

    <!-- 3. MANUAL COMPARATOR -->
    <div class="box box-manual-comparator">
        <h2 class="manual-comparator-title">3. Manual Comparator (1:1)</h2>
        <form id="verifyForm">
            <div class="manual-comparator-flex">
                <div class="manual-comparator-flex-child">
                    <label>Face A:</label>
                    <input type="file" id="fileA" accept="image/*" required onchange="showPreview(this, 'prevA')" title="Upload Face A" placeholder="Upload Face A" aria-label="Upload Face A">
                    <img id="prevA" class="preview">
                </div>
                <div class="manual-comparator-flex-child">
                    <label>Face B:</label>
                    <input type="file" id="fileB" accept="image/*" required onchange="showPreview(this, 'prevB')" title="Upload Face B" placeholder="Upload Face B" aria-label="Upload Face B">
                    <img id="prevB" class="preview">
                </div>
            </div>
            <button type="submit" class="compare-btn">Compare A vs B</button>
        </form>
        <div id="verifyResult" class="result"></div>
        <img id="matchPatternManual" class="match-pattern manual-border-color">
    </div>
</div>

<script>
    function showPreview(input, imgId) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();
            reader.onload = function (e) {
                var img = document.getElementById(imgId);
                img.src = e.target.result;
                img.style.display = 'block';
            }
            reader.readAsDataURL(input.files[0]);
        }
    }

    document.getElementById('registerForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('name', document.getElementById('regName').value);
        formData.append('image', document.getElementById('regPhoto').files[0]);
        try {
            const res = await fetch('/register', { method: 'POST', body: formData });
            const data = await res.json();
            const resDiv = document.getElementById('regResult');
            resDiv.style.display = 'block';
            resDiv.className = 'result ' + (data.status === 'success' ? 'success' : 'error');
            resDiv.innerText = data.message;
        } catch (err) { alert("Server Error"); }
    };

    document.getElementById('identifyForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('image', document.getElementById('checkPhoto').files[0]);
        try {
            const res = await fetch('/identify', { method: 'POST', body: formData });
            const data = await res.json();
            const resDiv = document.getElementById('idResult');
            resDiv.style.display = 'block';
            resDiv.className = 'result ' + (data.status === 'success' ? 'success' : 'error');
            resDiv.innerText = data.message + " (" + (data.score || '') + ")";
            
            const img = document.getElementById('matchPatternDB');
            if(data.image_data) {
                img.src = "data:image/jpeg;base64," + data.image_data;
                img.style.display = 'block';
            } else { img.style.display = 'none'; }
        } catch (err) { alert("Server Error"); }
    };

    document.getElementById('verifyForm').onsubmit = async (e) => {
        e.preventDefault();
        const formData = new FormData();
        formData.append('image1', document.getElementById('fileA').files[0]);
        formData.append('image2', document.getElementById('fileB').files[0]);
        try {
            const res = await fetch('/verify_manual', { method: 'POST', body: formData });
            const data = await res.json();
            const resDiv = document.getElementById('verifyResult');
            resDiv.style.display = 'block';
            resDiv.className = 'result ' + (data.status === 'success' ? 'success' : 'error');
            resDiv.innerText = data.message + " (" + data.score + ")";
            
            const img = document.getElementById('matchPatternManual');
            if(data.image_data) {
                img.src = "data:image/jpeg;base64," + data.image_data;
                img.style.display = 'block';
            } else { img.style.display = 'none'; }
        } catch (err) { alert("Server Error"); }
    };
</script>

</body>
</html>
